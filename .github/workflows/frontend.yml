name: Build Frontend in arm64 and amd64 and push to Docker Hub

env:
  VERSION: "v0.2.0"

on:
  push:
    branches: [ "main" ]
    paths:
      - "frontend/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - "frontend/**"

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v5
      -
        name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Build and push Docker image in both architectures
        uses: docker/build-push-action@v6
        with:
          context: ./frontend/
          push: ${{ github.event_name == 'push' }}
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/frontend-rpi:${{ env.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/frontend-rpi:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

